<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Geometria do Risco | Architecture v2</title>
    
    <!-- CSS Global -->
    <link rel="stylesheet" href="../../../style.css">
    <link rel="stylesheet" href="style-overrides.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <!-- Engine Dependencies (ApexCharts & html2pdf) -->
    <script src="https://cdn.jsdelivr.net/npm/apexcharts"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    
    <!-- Fonts -->
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&family=Playfair+Display:ital,wght@0,700;1,700&display=swap');
    </style>

    <!-- Modules -->
    <script type="module" src="main.js"></script>
</head>
<body class="flex flex-col items-center min-h-screen p-0 md:p-8 antialiased">

    <nav class="fixed top-0 left-0 w-full z-50 bg-[#020617]/90 backdrop-blur-md border-b border-white/5">
        <div class="ticker-container py-2">
            <div class="ticker-content text-[10px] uppercase font-bold tracking-[0.2em] text-indigo-400">
                <span><i class="fa-solid fa-microchip mr-2"></i>ICM e sobre EV monetario.</span>
                <span class="mx-8"><i class="fa-solid fa-database mr-2"></i>Risk Premium define a distancia entre o topo e o fundo.</span>
            </div>
        </div>
    </nav>

    <div class="w-full max-w-[1400px] flex flex-col gap-6 mt-16 relative z-10">
        
        <header class="text-center py-8 relative">
            <div class="glow-bg"></div>
            <h1 class="text-5xl md:text-7xl font-black tracking-tighter mb-4 text-white">
                Geometria do <span class="text-gradient">Risco</span>
            </h1>
            <p class="text-slate-400 text-xs md:text-sm font-bold uppercase tracking-[0.4em]">Arquitetura de Decisao Web Components</p>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-6 items-start px-4">
            
            <!-- Sidebar -->
            <aside class="lg:col-span-4 flex flex-col gap-4 sticky top-24">
                <div class="glass-panel p-4">
                    <span class="text-xs font-black text-slate-500 uppercase tracking-widest">Matrizes</span>
                </div>
                
                <!-- Custom Component: Lista de Cenarios -->
                <scenario-list id="main-scenario-list" class="glass-panel p-2 max-h-[70vh] overflow-y-auto block"></scenario-list>
            </aside>

            <!-- Main Stage -->
            <main class="lg:col-span-8 flex flex-col gap-6">
                <section class="glass-panel p-8 relative overflow-hidden">
                    <div class="flex justify-between items-end border-b border-white/5 pb-6 mb-8">
                        <div>
                            <span id="stage-context" class="badge">Contexto</span>
                            <h2 id="stage-title" class="text-3xl font-editorial font-bold text-white mt-2">Selecione</h2>
                        </div>
                    </div>

                    <div class="grid grid-cols-2 gap-8">
                        <!-- Custom Component: Gauges -->
                        <risk-gauge id="gauge-ip" label="Agressor" color="indigo"></risk-gauge>
                        <risk-gauge id="gauge-oop" label="Defensor" color="pink"></risk-gauge>
                    </div>
                </section>

                <!-- Conteudo Dinamico -->
                <div id="content-area" class="glass-panel p-8 min-h-[300px]"></div>
            </main>
        </div>
    </div>

</body>
</html>
